syntax = "proto3";

package common.v1;

option go_package = "github.com/hxllmvdx/Crypto-key-management-system/services/kms/gen/common/v1;commonv1";

enum KeyType {
  KEY_TYPE_UNSPECIFIED = 0;
  KEY_TYPE_AES_128 = 1;
  KEY_TYPE_AES_256 = 2;
  KEY_TYPE_RSA_2048 = 3;
}

enum KeyStatus {
  KEY_STATUS_UNSPECIFIED = 0;
  KEY_STATUS_ENABLED = 1;
  KEY_STATUS_DISABLED = 2;
  KEY_STATUS_DESTROYED = 3;
  KEY_STATUS_PENDING_ROTATION = 4;
  KEY_STATUS_PENDING_DEACTIVATION = 5;
  KEY_STATUS_EXPIRED = 6;
}