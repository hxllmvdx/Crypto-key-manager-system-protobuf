syntax = "proto3";

package kms.v1;

import "api/common/v1/types.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/hxllmvdx/Crypto-key-management-system/services/kms/gen/kms/v1;kmsv1";

message KeyMetadata {
  string key_id = 1;
  uint32 version = 2;
  common.v1.KeyType type = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  common.v1.KeyStatus status = 6;
}

message Key {
  KeyMetadata metadata = 1;
  bytes key_material = 2;
}

message GetKeyRequest {
  string key_id = 1;
  string user_id = 2;
}

message GetKeyResponse {
  Key key = 1;
}

message GenerateKeyRequest {
  common.v1.KeyType type = 1;
  string user_id = 2;
}

message GenerateKeyResponse {
  KeyMetadata metadata = 1;
}

message RotateKeyRequest {
  string key_id = 1;
  string user_id = 2;
}

message RotateKeyResponse {
  KeyMetadata metadata = 1;
}

message ListKeysRequest {
  string user_id = 1;
}

message ListKeysResponse {
  KeyMetadata key = 1;
}

message DisableKeyRequest {
  string key_id = 1;
  string user_id = 2;
}

message DisableKeyResponse {
  google.protobuf.Empty empty = 1;
}

message DestroyKeyRequest {
  string key_id = 1;
  string user_id = 2;
}

message DestroyKeyResponse {
  google.protobuf.Empty empty = 1;
}

message RestoreKeyRequest {
  string key_id = 1;
  string user_id = 2;
}

message RestoreKeyResponse {
  google.protobuf.Empty empty = 1;
}

service KMSService {
  rpc GenerateKey(GenerateKeyRequest) returns (GenerateKeyResponse);
  rpc GetKey(GetKeyRequest) returns (GetKeyResponse);
  rpc ListKeys(ListKeysRequest) returns (stream ListKeysResponse);
  rpc RotateKey(RotateKeyRequest) returns (RotateKeyResponse);
  rpc DisableKey(DisableKeyRequest) returns (DisableKeyResponse);
  rpc DestroyKey(DestroyKeyRequest) returns (DestroyKeyResponse);
  rpc RestoreKey(RestoreKeyRequest) returns (RestoreKeyResponse);
}
